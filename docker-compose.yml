version: '3.8'

services:
  fb-job-tracker:
    build: .
    container_name: fb_job_tracker
    ports:
      - "8000:8000"
    volumes:
      # Persist the SQLite database
      - ./jobs.db:/app/jobs.db
      - ./fb_cookies.json:/app/fb_cookies.json
      # Persist CV files if updated
      - ./resume/cv.txt:/app/cv.txt
      - ./resume/cv_vi.txt:/app/cv_vi.txt
      # Mount reports and actual applications directory
      - ./resume/actual_applications:/app/actual_applications
      - ./reports:/app/reports
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    restart: unless-stopped
