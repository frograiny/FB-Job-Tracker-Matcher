version: '3.8'

services:
  fb-job-tracker:
    build: .
    container_name: fb_job_tracker
    ports:
      - "8000:8000"
    volumes:
      # Mount data folder (for jobs.db, fb_cookies.json)
      - ./data:/app/data
      # Mount resume and CV files
      - ./resume:/app/resume
      # Mount reports directory
      - ./reports:/app/reports
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    restart: unless-stopped
